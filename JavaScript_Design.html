k<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Theme Toggle</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    padding-top:100px;
    transition: 0.3s;
}

/* Dark Theme */
.dark{
    background:#0f172a;
    color:white;
}

/* Light Theme */
.light{
    background:white;
    color:black;
}

button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

</style>

</head>

<body class="dark">

<h1>Theme Switcher</h1>

<button onclick="toggleTheme()">Switch Theme</button>

<script>

function toggleTheme(){

    var body = document.body;

    if(body.classList.contains("dark")){
        body.classList.remove("dark");
        body.classList.add("light");
    }
    else{
        body.classList.remove("light");
        body.classList.add("dark");
    }

}

</script>

</body>
</html>
